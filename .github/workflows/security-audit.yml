name: Security Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and core dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install --with dev

      - name: Audit installed packages
        run: |
          poetry run pip install pip-audit
          poetry run pip freeze > /tmp/freeze.txt
          poetry run pip-audit -r /tmp/freeze.txt --desc on
