name: Deploy Documentation to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clear stale custom domain
        continue-on-error: true
        run: |
          STATUS=$(curl -sS -o /tmp/pages_resp.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d '{"build_type":"workflow","cname":null}')
          echo "Pages API HTTP ${STATUS}"
          cat /tmp/pages_resp.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build documentation
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material "mkdocstrings[python]"
          pip install -e .
          mkdocs build --site-dir site
          touch site/.nojekyll
          test ! -f site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
