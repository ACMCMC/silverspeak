name: Fix Pages Custom Domain

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  clear-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Show current Pages config
        continue-on-error: true
        run: |
          curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" | python3 -m json.tool

      - name: Remove custom domain from GitHub Pages
        run: |
          STATUS=$(curl -sS -o /tmp/pages_resp.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d '{"build_type":"workflow","cname":null}')
          echo "Pages API HTTP ${STATUS}"
          cat /tmp/pages_resp.json
          test "${STATUS}" = "200" -o "${STATUS}" = "202" -o "${STATUS}" = "204"
          echo "Done. Try https://acmcmc.github.io/silverspeak/"
