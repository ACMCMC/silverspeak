name: Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint with flake8
        run: |
          poetry run flake8 silverspeak/ --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 silverspeak/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: poetry run black --check --quiet silverspeak/

      - name: Check import sorting with isort
        run: poetry run isort --check --profile black silverspeak/

      - name: Type check with mypy
        run: poetry run mypy silverspeak/
