name: Acceptability Test Workflow

on:
  push:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  acceptability-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install

      - name: Run v3 tests
        run: |
          poetry run pytest test/test_benchmark.py test/test_fast_normalize.py test/test_hkb.py test/test_targeted_attack.py -q
